# Local development docker-compose for Transportados SQL Server
# Run: docker-compose up -d
# Connect from host: Server=localhost,1436;Database=Transportados;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transportados-sqlserver-dev
    ports:
      - "1436:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    volumes:
      - transportados-sqlserver-dev-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  transportados-sqlserver-dev-data:
    name: transportados-sqlserver-dev-data
